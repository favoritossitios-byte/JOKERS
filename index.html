<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Joker Hop</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- ====================== SETUP SCREEN ====================== -->
  <section id="setup-screen" class="screen active">
    <div class="setup-bg-orbs">
      <span class="orb o1"></span><span class="orb o2"></span><span class="orb o3"></span>
    </div>

    <h1 class="title">
      <span class="title-emoji">🃏</span>
      <span class="title-text">Joker Hop</span>
    </h1>

    <div class="players-row">
      <!-- Player 1 -->
      <div class="player-card" data-player="1">
        <div class="player-label">Jogador 1</div>
        <div class="emoji-picker">
          <button class="arrow left" data-dir="-1" data-player="1" aria-label="anterior">‹</button>
          <div class="emoji-stage">
            <span class="emoji-display" data-player="1">🙂</span>
          </div>
          <button class="arrow right" data-dir="1" data-player="1" aria-label="seguinte">›</button>
        </div>
        <div class="type-toggle" data-player="1">
          <button class="toggle-btn active" data-type="human">🧠 Humano</button>
          <button class="toggle-btn" data-type="bot">🤖 Bot</button>
        </div>
      </div>

      <div class="vs">VS</div>

      <!-- Player 2 -->
      <div class="player-card" data-player="2">
        <div class="player-label">Jogador 2</div>
        <div class="emoji-picker">
          <button class="arrow left" data-dir="-1" data-player="2" aria-label="anterior">‹</button>
          <div class="emoji-stage">
            <span class="emoji-display" data-player="2">🤖</span>
          </div>
          <button class="arrow right" data-dir="1" data-player="2" aria-label="seguinte">›</button>
        </div>
        <div class="type-toggle" data-player="2">
          <button class="toggle-btn" data-type="human">🧠 Humano</button>
          <button class="toggle-btn active" data-type="bot">🤖 Bot</button>
        </div>
      </div>
    </div>

    <div class="mode-row">
      <button class="mode-btn active" data-mode="1">
        <span class="mode-num">1</span>
        <span class="mode-name">Clássico</span>
      </button>
      <button class="mode-btn locked" data-mode="2" disabled>
        <span class="mode-num">2</span>
        <span class="mode-name">Em breve</span>
        <span class="lock">🔒</span>
      </button>
      <button class="mode-btn locked" data-mode="3" disabled>
        <span class="mode-num">3</span>
        <span class="mode-name">Em breve</span>
        <span class="lock">🔒</span>
      </button>
    </div>

    <div class="theme-row" id="theme-row">
      <button class="theme-btn active" data-theme="normal" title="Normal">
        <span class="theme-swatch swatch-normal"><i></i></span>
        <span class="theme-name">Normal</span>
      </button>
      <button class="theme-btn" data-theme="jungle" title="Selva">
        <span class="theme-swatch swatch-jungle"><i></i></span>
        <span class="theme-name">🌴 Selva</span>
      </button>
      <button class="theme-btn" data-theme="ocean" title="Mar">
        <span class="theme-swatch swatch-ocean"><i></i></span>
        <span class="theme-name">🌊 Mar</span>
      </button>
      <button class="theme-btn" data-theme="desert" title="Deserto">
        <span class="theme-swatch swatch-desert"><i></i></span>
        <span class="theme-name">🏜️ Deserto</span>
      </button>
      <button class="theme-btn" data-theme="lava" title="Lava">
        <span class="theme-swatch swatch-lava"><i></i></span>
        <span class="theme-name">🌋 Lava</span>
      </button>
    </div>

    <button id="start-btn" class="start-btn">
      <span>JOGAR</span>
      <span class="arrow-icon">→</span>
    </button>

    <div class="sound-row">
      <button id="sfx-toggle" class="sound-btn active" title="Efeitos sonoros">🔊 SFX</button>
      <button id="music-toggle" class="sound-btn" title="Música ambiente">🎵 Música</button>
    </div>
  </section>

  <!-- ====================== GAME SCREEN ====================== -->
  <section id="game-screen" class="screen">
    <header class="game-header">
      <button id="back-btn" class="ghost-btn" title="Voltar ao menu">‹</button>
      <div id="status" class="status-bar"></div>
      <button id="sfx-toggle-game" class="ghost-btn" title="Som on/off">🔊</button>
      <button id="log-toggle" class="ghost-btn" title="Mostrar/esconder log">📜</button>
    </header>

    <div class="board-area">
      <div id="board-wrap">
        <div id="board"></div>
      </div>
    </div>

    <aside id="log-panel" class="hidden">
      <h3>Histórico</h3>
      <ul id="log"></ul>
    </aside>

    <div id="fx-layer" class="fx-layer"></div>
    <div id="screen-flash" class="screen-flash"></div>
    <div id="combo-counter" class="combo-counter"></div>

    <!-- Game over overlay -->
    <div id="gameover-overlay" class="overlay hidden">
      <div class="overlay-card">
        <div id="gameover-emoji" class="gameover-emoji">🎉</div>
        <h2 id="gameover-title">Vitória!</h2>
        <p id="gameover-sub"></p>
        <div class="overlay-actions">
          <button id="play-again" class="start-btn small">Outra vez</button>
          <button id="to-menu" class="ghost-btn">Menu</button>
        </div>
      </div>
    </div>
  </section>

  <script src="game.js"></script>
  <script src="sound.js"></script>
  <script src="bot.js"></script>
  <script src="app.js"></script>
</body>
</html>
